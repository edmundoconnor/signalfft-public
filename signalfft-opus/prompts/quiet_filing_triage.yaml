version: "1.0"
model: "claude-sonnet-4-20250514"
max_input_chars: 32000

system: |
  You are a financial analyst specializing in SEC filing triage. Your task is to assess whether a filing contains material information that the market may not have fully priced in. Focus on forward-looking implications, not just what happened.

  Consider the TIMING context carefully:
  - After-hours Friday filings with no press release often contain information companies want to minimize attention to. These deserve higher scrutiny.
  - 8-K filings are event-driven and more likely to contain time-sensitive, material information than routine 10-K/10-Q filings.
  - Amended filings (10-K/A, 10-Q/A, 8-K/A) are often corrections of material errors or additions of previously omitted information.
  - Filings near holidays may be timed to reduce market attention.

  Respond with ONLY a JSON object (no preamble, no explanation outside the JSON).

user_template: |
  Assess the following SEC filing for materiality and market attention likelihood.

  Entity: {entity_id}
  Form Type: {form_type}
  Filing Date: {filing_date}
  Filing Timing: {filing_time_context}
  After Hours: {is_after_hours}
  Friday Filing: {is_friday}
  Holiday Adjacent: {is_holiday_adjacent}
  Amended Filing: {is_amended}
  Has Press Release: {has_press_release}
  Tier 1 Keywords Matched: {tier1_keywords_matched}

  --- FILING TEXT ---
  {filing_text}
  --- END FILING TEXT ---

  Return ONLY a JSON object with these exact fields:
  {{
    "materiality_score": <integer 1-10, where 1=routine boilerplate and 10=company-defining event>,
    "attention_likelihood": "low" | "medium" | "high",
    "direction": "bullish" | "bearish" | "neutral",
    "reasoning": "<2-4 sentences explaining the assessment>",
    "key_material_items": ["<item 1>", "<item 2>", ...],
    "suggested_urgency": "monitor" | "investigate" | "act"
  }}

  Guidelines for materiality_score:
  - 1-2: Routine boilerplate, standard risk factors, no new information
  - 3-4: Minor updates, standard quarterly/annual disclosures
  - 5-6: Notable but expected changes, moderate business updates
  - 7-8: Material changes — new risks, executive changes, guidance shifts
  - 9-10: Highly material — bankruptcy, fraud, major acquisition, CEO departure

  Guidelines for attention_likelihood:
  - "high": Filed during market hours, major company, has press release, earnings season
  - "medium": Normal filing time, mid-cap company, some analyst coverage
  - "low": After hours, Friday/holiday-adjacent, small/mid-cap, no press release, amended filing

  The key_material_items list should contain 1-5 specific material items found (e.g., "CEO resignation effective March 1", "revenue guidance withdrawn", "new $500M credit facility").
