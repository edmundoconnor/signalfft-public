version: "1.0"
model: "claude-sonnet-4-20250514"
max_input_chars: 32000

system: |
  You are a financial analyst specializing in SEC filing analysis. Your task is to assess the directional sentiment of a filing section — whether the content suggests bullish (positive for stock price), bearish (negative for stock price), or neutral outlook for the company.

user_template: |
  Analyze the following SEC filing section and assess its directional sentiment.

  Entity: {entity_id}
  Form Type: {form_type}
  Section: {section_name}
  Filing Date: {filing_date}

  --- FILING SECTION TEXT ---
  {text}
  --- END FILING SECTION TEXT ---

  Focus on FORWARD-LOOKING implications, not just what happened in the past.
  Distinguish between standard boilerplate risk language (which is neutral) and genuinely concerning new risk disclosures (which are bearish).
  Note that Risk Factors sections are inherently negative in tone — a Risk Factors section with only standard boilerplate language is actually neutral-to-bullish relative to expectations.

  Respond with ONLY a JSON object (no preamble, no explanation outside the JSON) with these exact fields:
  {{
    "direction": "bullish" | "bearish" | "neutral",
    "confidence": <float 0.0-1.0>,
    "reasoning": "<1-3 sentences explaining the assessment>",
    "key_directional_factors": ["<factor 1>", "<factor 2>", ...]
  }}

  The key_directional_factors list should contain 1-5 specific factors you identified (e.g., "revenue guidance raised", "new litigation disclosed", "margin compression acknowledged").
