name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-common:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install and test signalfft-common
        run: |
          cd signalfft-common
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest moto[dynamodb,s3,sqs] boto3
          python -m pytest tests/ -v

  test-engine:
    runs-on: ubuntu-latest
    needs: test-common
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install common + engine and test
        run: |
          cd signalfft-common && pip install -e . && cd ..
          cd signalfft-engine
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest moto[dynamodb,s3,sqs] boto3
          python -m pytest tests/ -v

  test-collectors:
    runs-on: ubuntu-latest
    needs: test-common
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install common + collectors and test
        run: |
          cd signalfft-common && pip install -e . && cd ..
          cd signalfft-collectors
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest moto[dynamodb,s3,sqs] boto3 responses
          python -m pytest tests/ -v

  test-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Build dashboard
        run: |
          cd signalfft-dashboard
          npm install --no-audit --no-fund
          npm run build

  test-risk-gateway:
    runs-on: ubuntu-latest
    needs: test-common
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install common + risk-gateway and test
        run: |
          cd signalfft-common && pip install -e . && cd ..
          cd signalfft-risk-gateway
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest moto[dynamodb,s3,sqs] boto3
          python -m pytest tests/ -v

  test-execution:
    runs-on: ubuntu-latest
    needs: test-common
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install common + execution and test
        run: |
          cd signalfft-common && pip install -e . && cd ..
          cd signalfft-execution
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest moto[dynamodb,s3,sqs] boto3
          python -m pytest tests/ -v
